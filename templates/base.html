<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>AniSync</title>
    <meta name="description" content="A Stremio addon to update your anime watchlists on MyAnimeList and AniList. Track episodes in real-time, get new episode notifications directly via anime posters, and receive personalized recommendations based on your viewing history.">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="{{ request.url if request else '' }}">
    <meta property="og:title" content="AniSync - Stremio Addon">
    <meta property="og:description" content="A Stremio addon to update your anime watchlists on MyAnimeList and AniList. Track episodes in real-time, get new episode notifications directly via anime posters, and receive personalized recommendations based on your viewing history.">
    <meta property="og:image" content="{{ request.host_url if request else '' }}logo.png?v=7">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary">
    <meta property="twitter:url" content="{{ request.url if request else '' }}">
    <meta property="twitter:title" content="AniSync - Stremio Addon">
    <meta property="twitter:description" content="A Stremio addon to update your anime watchlists on MyAnimeList and AniList. Track episodes in real-time, get new episode notifications directly via anime posters, and receive personalized recommendations based on your viewing history.">
    <meta property="twitter:image" content="{{ request.host_url if request else '' }}logo.png?v=7">

    <link rel="icon" type="image/png" href="/logo.png?v=7">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #0d0d0d; color: #e0e0e0; min-height: 100vh; font-size: 15px; }
        .navbar-brand { font-weight: 700; letter-spacing: 0.03em; font-size: 1.1rem; }
        .github-link { color: #888; transition: color 0.2s; text-decoration: none; }
        .github-link:hover { color: #fff; }
        .card-dark { background: #161616; border: 1px solid #2a2a2a; border-radius: 12px; }
        .btn-mal { background: #2e51a2; color: #fff; border: none; }
        .btn-mal:hover, .btn-mal:active { background: #3a64cc; color: #fff; }
        .btn-anilist { background: #02a9ff; color: #fff; border: none; }
        .btn-anilist:hover, .btn-anilist:active { background: #0090df; color: #fff; }
        .btn-simkl { background: #e27d00; color: #fff; border: none; }
        .btn-simkl:hover, .btn-simkl:active { background: #ff941a; color: #fff; }
        .manifest-box { background: #1a1a1a; border: 1px solid #333; color: #f0c040; font-family: monospace; font-size: 0.8rem; }
        footer { border-top: 1px solid #1e1e1e; color: #555; font-size: 0.82rem; }
        .flash-wrap { margin-top: 65px; }
        @media (max-width: 576px) {
            .flash-wrap { margin-top: 60px; }
            .card-dark { border-radius: 10px; }
            .navbar { padding-left: 1rem !important; padding-right: 1rem !important; }
            .btn { font-size: 0.9rem; }
        }

        /* Toast Container & Notification Styles */
        .toast-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 12px;
            pointer-events: none;
        }
        .custom-toast {
            min-width: 250px;
            max-width: 380px;
            background: rgba(22, 22, 22, 0.92);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-left: 4px solid #02a9ff;
            border-radius: 10px;
            padding: 12px 18px;
            color: #e0e0e0;
            font-size: 0.88rem;
            display: flex;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            pointer-events: auto;
            transform: translateY(120%) scale(0.9);
            opacity: 0;
            transition: all 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .custom-toast.show {
            transform: translateY(0) scale(1);
            opacity: 1;
        }
        .custom-toast.success {
            border-left-color: #2ec4b6;
        }
        .custom-toast.error {
            border-left-color: #e71d36;
        }
        .custom-toast.info {
            border-left-color: #02a9ff;
        }
        @media (max-width: 576px) {
            .toast-container {
                right: 16px;
                left: 16px;
                bottom: 16px;
            }
            .custom-toast {
                min-width: 0;
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark fixed-top px-4" style="background:#111;border-bottom:1px solid #222;">
        <a class="navbar-brand" href="/">
            AniSync
        </a>
        {% if session.get('user') %}
        <div class="d-flex gap-2">
            <a href="{{ url_for('auth.logout') }}" class="btn btn-sm btn-outline-danger">
                <i class="fa-solid fa-right-from-bracket me-1"></i><span class="d-none d-sm-inline">Logout</span>
            </a>
        </div>
        {% endif %}
    </nav>

    <div class="container py-4 flash-wrap">
        {% block content %}{% endblock %}
    </div>

    <footer class="text-center py-4 mt-3" style="border-top: 1px solid #1e1e1e; color: #888;">
        <p class="mb-1 text-secondary">AniSync. Elevating your tracking experience.</p>
        <div class="mb-2 d-flex justify-content-center align-items-center gap-3" style="font-size: 0.82rem;">
            <a href="https://github.com/atharvkharbade/anisync-addon" target="_blank" class="github-link d-inline-flex align-items-center gap-1">
                <i class="fa-brands fa-github"></i> GitHub
            </a>
            <span style="color: #333;">•</span>
            <a href="https://github.com/atharvkharbade/anisync-addon/issues" target="_blank" class="github-link d-inline-flex align-items-center gap-1">
                Report an Issue
            </a>
        </div>
        <div class="small" style="font-size: 0.78rem; color: #a0a0a0;">Created with <i class="fa-solid fa-heart text-danger"></i> for the Stremio Community.</div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function showToast(message, type = 'info') {
            let container = document.getElementById('toast-container');
            if (!container) {
                container = document.createElement('div');
                container.id = 'toast-container';
                container.className = 'toast-container';
                document.body.appendChild(container);
            }

            const toast = document.createElement('div');
            toast.className = `custom-toast ${type}`;
            
            let icon = '<i class="fa-solid fa-circle-info me-2 text-info"></i>';
            if (type === 'success') {
                icon = '<i class="fa-solid fa-circle-check me-2 text-success"></i>';
            } else if (type === 'error') {
                icon = '<i class="fa-solid fa-circle-exclamation me-2 text-danger"></i>';
            }
            
            toast.innerHTML = `${icon}<span>${message}</span>`;
            container.appendChild(toast);

            // Trigger animation
            setTimeout(() => toast.classList.add('show'), 50);

            // Auto-dismiss after 3.5 seconds
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 400);
            }, 3500);
        }

        function copyToClipboard(id) {
            const el = document.getElementById(id);
            navigator.clipboard.writeText(el.value)
                .then(() => showToast("Copied to clipboard!", "success"))
                .catch(() => {
                    el.select();
                    document.execCommand('copy');
                    showToast("Copied to clipboard!", "success");
                });
        }

        // Render any server-side flashed messages as custom toasts on load
        document.addEventListener("DOMContentLoaded", function() {
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% for category, message in messages %}
                    (function() {
                        let type = 'info';
                        let cat = '{{ category }}';
                        if (cat === 'success') type = 'success';
                        else if (cat === 'danger' || cat === 'warning') type = 'error';
                        showToast("{{ message }}", type);
                    })();
                {% endfor %}
            {% endwith %}
        });
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
