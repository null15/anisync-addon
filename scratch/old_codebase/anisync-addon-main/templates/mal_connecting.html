<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>Connecting to MyAnimeList — AniSync</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #0d0d0d; color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; padding: 1rem;
        }
        .box {
            text-align: center; width: 100%; max-width: 360px;
            padding: 2rem 1.5rem;
            background: #161616; border: 1px solid #2a2a2a; border-radius: 16px;
        }
        .icon { font-size: 2.5rem; margin-bottom: 1rem; }
        .spinner {
            width: 44px; height: 44px;
            border: 3px solid #2a2a2a; border-top-color: #2e51a2;
            border-radius: 50%; animation: spin 0.8s linear infinite;
            margin: 0 auto 1.25rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        h2 { font-size: 1.2rem; font-weight: 600; margin-bottom: 0.5rem; }
        p { color: #888; font-size: 0.9rem; line-height: 1.5; }
        a { color: #02a9ff; text-decoration: none; }
    </style>
    <meta http-equiv="refresh" content="0;url={{ redirect_url }}">
</head>
<body>
<div class="box">
    <div class="spinner"></div>
    <h2>Connecting to MyAnimeList</h2>
    <p>You'll be redirected to MAL to authorize.<br>
    If nothing happens, <a href="{{ redirect_url }}">tap here</a>.</p>
</div>
</body>
</html>
