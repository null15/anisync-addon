<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>Connecting to AniList — AniSync</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #0d0d0d; color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; padding: 1rem;
        }
        .box {
            text-align: center; width: 100%; max-width: 360px;
            padding: 2rem 1.5rem;
            background: #161616; border: 1px solid #2a2a2a; border-radius: 16px;
        }
        .spinner {
            width: 44px; height: 44px;
            border: 3px solid #2a2a2a; border-top-color: #02a9ff;
            border-radius: 50%; animation: spin 0.8s linear infinite;
            margin: 0 auto 1.25rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        h2 { font-size: 1.2rem; font-weight: 600; margin-bottom: 0.5rem; }
        p { color: #888; font-size: 0.9rem; line-height: 1.5; }
        .error { color: #f55; }
        a { color: #02a9ff; text-decoration: none; }
    </style>
</head>
<body>
<div class="box">
    <div class="spinner" id="spinner"></div>
    <h2 id="title">Connecting to AniList</h2>
    <p id="msg">Saving your session...</p>
</div>
<script>
    (async function () {
        const hash = window.location.hash;
        const match = hash.match(/access_token=([^&]+)/);

        if (!match) {
            document.getElementById('spinner').style.display = 'none';
            document.getElementById('title').textContent = 'Connection Failed';
            document.getElementById('msg').innerHTML =
                '<span class="error">No token found in redirect.</span><br><br>' +
                '<a href="/">Back to home</a>';
            return;
        }

        const token = match[1];

        try {
            const resp = await fetch('/anilist-save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: 'token=' + encodeURIComponent(token),
            });
            const data = await resp.json();

            if (data.ok) {
                document.getElementById('title').textContent = 'Connected!';
                document.getElementById('msg').textContent =
                    'Signed in as ' + data.username + '. Redirecting...';
                setTimeout(() => { window.location.href = '/configure'; }, 1200);
            } else {
                throw new Error(data.error || 'Unknown error');
            }
        } catch (err) {
            document.getElementById('spinner').style.display = 'none';
            document.getElementById('title').textContent = 'Connection Failed';
            document.getElementById('msg').innerHTML =
                '<span class="error">' + err.message + '</span><br><br>' +
                '<a href="/">Back to home</a>';
        }
    })();
</script>
</body>
</html>
